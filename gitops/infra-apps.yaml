apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/abderahman856/EKS-projeject.git
    targetRevision: main
    path: kubernetes
    directory:
      recurse: true
      exclude: 'helm/*' # This prevents double-deploying the helm chart here
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true