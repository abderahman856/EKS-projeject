# 1. Grafana Configuration
grafana:
  enabled: true
  adminPassword: "admin" # Change this later!
  
  # Resource Management (Optimized for t3.micro)
  resources:
    requests:
      memory: "100Mi"
      cpu: "100m"
    limits:
      memory: "200Mi"
      cpu: "200m"

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      external-dns.alpha.kubernetes.io/hostname: grafana.baashe.uk
    hosts:
      - grafana.baashe.uk
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.baashe.uk

  # DISABLED EBS REQUIREMENT
  persistence:
    enabled: false

# 2. Prometheus Configuration
prometheus:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      external-dns.alpha.kubernetes.io/hostname: prometheus.baashe.uk
    hosts:
      - prometheus.baashe.uk
    tls:
      - secretName: prometheus-tls
        hosts:
          - prometheus.baashe.uk

  prometheusSpec:
    retention: 1d # Lowered retention for memory savings
    # Resource Management
    resources:
      requests:
        memory: "300Mi"
        cpu: "100m"
      limits:
        memory: "500Mi"
        cpu: "300m"
    
    # DISABLED EBS REQUIREMENT - Using Node Memory instead
    storageSpec:
      emptyDir:
        medium: Memory