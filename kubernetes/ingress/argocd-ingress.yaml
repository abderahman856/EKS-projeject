apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    # Use your Cert-Manager issuer for SSL
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Argo CD server uses TLS by default, so we tell Nginx to talk to the backend over HTTPS
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - argo.baashe.uk  # <-- Replace with your actual domain
    secretName: argocd-server-tls
  rules:
  - host: argo.baashe.uk # <-- Replace with your actual domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              number: 443