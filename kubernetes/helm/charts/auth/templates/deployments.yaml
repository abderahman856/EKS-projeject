apiVersion: apps/v1
kind: Deployment
metadata:   
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.global.repository }}/{{ .Values.image.repository }}:{{ .Values.global.tag | default .Values.image.tag | default "latest" }}"
          ports:
            - containerPort: {{ .Values.service.port }}
          
          # This is correct for ESO. 
          # ESO will create a secret named "{{ .Chart.Name }}-secrets" 
          # which contains DB_PASSWORD and JWT_SECRET.
          envFrom:  # <--- Line 32 is likely here or just below
            - configMapRef:
                name: {{ .Chart.Name }}-config
            - configMapRef:
                name: shared-global-config
            - secretRef: 
                name: auth-secrets

          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}