replicaCount: 1

image:
  repository: product-service
  tag: latest

service:
  type: ClusterIP
  port: 8085

externalApi: "https://dummyjson.com"

resources:
  requests:
    cpu: "10m"       # Only request 1% of a core
    memory: "32Mi"   # Very small start-up memory
  limits:
    cpu: "100m"
    memory: "128Mi"
