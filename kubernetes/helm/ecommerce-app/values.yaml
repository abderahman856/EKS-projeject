global:
  registry: "723580626973.dkr.ecr.us-east-1.amazonaws.com"
  tag: "latest"
  awsRegion: "us-east-1"
  env: "production"
  ingress:
    enabled: true
    className: "alb"
    host: "ecommerce.local"
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
  sharedEnv:
    LOG_LEVEL: "info"
    AUTH_API_URL: "http://auth:8080"
    CART_API_URL: "http://cart:8081"
    NOTIFICATION_API_URL: "http://notification:8082"
    ORDER_API_URL: "http://order:8083"
    PAYMENT_API_URL: "http://payment:8084"
    PRODUCT_API_URL: "http://product:8085"

frontend:
  replicaCount: 1
  image:
    repository: "frontend-service"
  service:
    type: ClusterIP
    port: 80
  resources: {}

auth:
  replicaCount: 1
  image:
    repository: "auth-service"
  service:
    type: ClusterIP
    port: 8080
  resources: {}

cart:
  replicaCount: 1
  image:
    repository: "cart-service"
  service:
    type: ClusterIP
    port: 8081
  resources: {}

notification:
  replicaCount: 1
  image:
    repository: "notification-service"
  service:
    type: ClusterIP
    port: 8082
  resources: {}

order:
  replicaCount: 1
  image:
    repository: "order-service"
  service:
    type: ClusterIP
    port: 8083
  database:
    host: "postgres.default.svc.cluster.local"
    port: 5432
  secrets:
    create: true
    dbUser: "postgres"
    dbPassword: "postgres"
    dbName: "order_db"
  resources: {}

payment:
  replicaCount: 1
  image:
    repository: "payment-service"
  service:
    type: ClusterIP
    port: 8084
  resources: {}

product:
  replicaCount: 1
  image:
    repository: "product-service"
  service:
    type: ClusterIP
    port: 8085
  externalApi: "https://dummyjson.com"
  resources: {}

  secrets:
    rdsSecretArn: "arn:aws:secretsmanager:us-east-1:123456789:secret:baashe-db-xyz"

payment:
  replicaCount: 1
  image:
    repository: "ecommerce-payment"
  service:
    port: 8084
  resources:
    requests:
      cpu: 250m
      memory: 256Mi

product:
  replicaCount: 1
  image:
    repository: "ecommerce-product"
  service:
    port: 8085