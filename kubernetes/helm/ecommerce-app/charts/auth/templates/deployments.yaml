apiVersion: apps/v1
kind: Deployment
metadata:   
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.global.repository }}/{{ .Chart.Name }}:{{ .Values.global.tag | default "latest" }}"
          ports:
            - containerPort: {{ .Values.service.port }}
          
          # This is correct for ESO. 
          # ESO will create a secret named "{{ .Chart.Name }}-secrets" 
          # which contains DB_PASSWORD and JWT_SECRET.
          envFrom:
            - configMapRef:
                name: {{ .Chart.Name }}-config
            - secretRef: 
                name: {{ .Chart.Name }}-secrets

          resources:
            