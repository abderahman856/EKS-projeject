apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}-global-config
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
data:
  # Environment Discovery
  NODE_ENV: {{ .Values.global.env | default "production" | quote }}
  REGION: {{ .Values.global.awsRegion | default "us-east-1" | quote }}

  # Internal Service Discovery (Service-to-Service communication)
  # These use the internal K8s DNS names: http://[service-name]:[port]
  AUTH_API_URL: "http://auth:8080"
  CART_API_URL: "http://cart:8081"
  NOTIFICATION_API_URL: "http://notification:8082"
  ORDER_API_URL: "http://order:8083"
  PAYMENT_API_URL: "http://payment:8084"
  PRODUCT_API_URL: "http://product:8085"

  # Shared Feature Toggles or Global Settings
  ENABLE_ANALYTICS: "true"
  LOG_LEVEL: "info"