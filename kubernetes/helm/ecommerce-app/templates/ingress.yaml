{{- if .Values.global.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce-ingress
  labels:
    app.kubernetes.io/name: ecommerce-app
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: {{ .Values.global.ingress.className | quote }}
  rules:
    - host: {{ .Values.global.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: {{ .Values.frontend.service.port }}
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: {{ .Values.auth.service.port }}
          - path: /api/cart
            pathType: Prefix
            backend:
              service:
                name: cart
                port:
                  number: {{ .Values.cart.service.port }}
          - path: /api/order
            pathType: Prefix
            backend:
              service:
                name: order
                port:
                  number: {{ .Values.order.service.port }}
          - path: /api/payment
            pathType: Prefix
            backend:
              service:
                name: payment
                port:
                  number: {{ .Values.payment.service.port }}
          - path: /api/product
            pathType: Prefix
            backend:
              service:
                name: product
                port:
                  number: {{ .Values.product.service.port }}
{{- end }}
