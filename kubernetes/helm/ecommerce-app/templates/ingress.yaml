apiVersion: networking.k8s.io/v1
kind: ingress
metadata:
  name: {{ .chart.name }}-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # Essential: Strips the /auth, /cart, etc. from the URL before sending to the app
    nginx.ingress.kubernetes.io/rewrite-target: /
    # Essential: Allows larger uploads for frontend/product services
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  
spec:
  rules:
    - http:
        paths:

          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

          - path: /auth
            pathTypes: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 8080
          
          - path: /cart
            pathTypes: Prefix
            backend:
              service:
                name: cart
                port:
                  number: 8081
          
          - path: /notification
            pathType: Prefix
            backend:
              service:
                name: notification
                port:
                  number: 8082
          
          - path: /order
            pathTypes: Prefix
            backend:
              service:
                name: order
                port:
                  number: 8083
          
          - path: /payment
            pathTypes: Prefix
            backend:
              service:
                name: payment
                port:
                  number: 8084
          
          - path: /product
            pathTypes: Prefix
            backend:
              service:
                name: product
                port:
                  number: 8085
          
                    