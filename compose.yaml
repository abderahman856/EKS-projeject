version: '3.8'

x-service-base: &service-base
  restart: unless-stopped
  networks:
    - backend-net
  environment:
    RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    DB_USER: ${DB_USER}
    DB_PASSWORD: ${DB_PASSWORD}
    RDS_ENDPOINT: ${RDS_ENDPOINT} 

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile     
    ports:
      - "3000:80"                
    networks:
      - backend-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
    networks:
      - backend-net

  auth:
    <<: *service-base
    build: ./services/auth
    depends_on:
      rabbitmq:
        condition: service_healthy 
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@${RDS_ENDPOINT}:5432/auth_db

  order:
    <<: *service-base
    build: ./services/order
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@${RDS_ENDPOINT}:5432/order_db

  notification:
    <<: *service-base
    build: ./services/notification
    depends_on:
      rabbitmq:
        condition: service_healthy

  cart:
    <<: *service-base
    build: ./services/cart

  payment:
    <<: *service-base
    build: ./services/payment

  product:
    <<: *service-base
    build: ./services/product

networks:
  backend-net:
    driver: bridge